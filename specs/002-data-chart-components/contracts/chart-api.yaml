openapi: 3.0.3
info:
  title: Yoca Chart Data API
  description: |
    REST API for retrieving pre-processed chart data for the Yoca crypto portfolio dashboard.
    All endpoints support filtering by time period, tokens, and transaction types.
  version: 1.0.0
  contact:
    name: Yoca Development Team

servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: https://api.yoca.app
    description: Production server

tags:
  - name: Balance
    description: Portfolio balance and trend data
  - name: Distribution
    description: Asset distribution and allocation data
  - name: Exchanges
    description: Exchange trading activity comparison
  - name: Counterparties
    description: Counterparty transaction analysis
  - name: PnL
    description: Profit and loss tracking
  - name: Transactions
    description: Transaction distribution and analysis
  - name: Holdings
    description: Token holding duration analysis

paths:
  /charts/balance:
    get:
      tags: [Balance]
      summary: Get balance trend data
      description: |
        Returns time-series data for portfolio balance over a specified period.
        Data is pre-aggregated based on the time period to optimize performance.
      operationId: getBalanceTrend
      parameters:
        - $ref: "#/components/parameters/TimePeriod"
        - $ref: "#/components/parameters/Tokens"
        - $ref: "#/components/parameters/Wallets"
        - name: aggregation
          in: query
          description: Data aggregation level (auto-determined if not specified)
          schema:
            type: string
            enum: [hourly, daily, weekly, monthly]
      responses:
        "200":
          description: Balance trend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceTrendResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /charts/distribution:
    get:
      tags: [Distribution]
      summary: Get asset distribution
      description: |
        Returns current portfolio distribution across different cryptocurrencies.
        Values are in the user's preferred display currency (USD by default).
      operationId: getAssetDistribution
      parameters:
        - $ref: "#/components/parameters/Wallets"
        - name: limit
          in: query
          description: Maximum number of tokens to return (others grouped as "Other")
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Asset distribution data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDistributionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /charts/exchanges:
    get:
      tags: [Exchanges]
      summary: Get exchange comparison data
      description: |
        Returns comparison of trading activity across different exchanges.
        Shows deposits and withdrawals for each exchange.
      operationId: getExchangeComparison
      parameters:
        - name: timePeriod
          in: query
          description: Legacy chart time period selector
          required: false
          schema:
            type: string
            enum: ["7D", "30D", "60D", "90D", "1Y", "All"]
            default: "30D"
        - name: period
          in: query
          description: Wallet-aware time period selector (overrides timePeriod when provided)
          required: false
          schema:
            type: string
            enum: ["7D", "30D", "60D", "90D", "1Y", "All"]
        - name: metric
          in: query
          description: Metric to compare (count of transactions or total volume)
          schema:
            type: string
            enum: [count, volume]
            default: count
        - name: wallets
          in: query
          description: Optional comma-separated wallet list; when provided route uses wallet-aware exchange aggregation
          required: false
          schema:
            type: string
        - name: address
          in: query
          description: Optional single-wallet override for wallet-aware exchange aggregation
          required: false
          schema:
            type: string
        - name: chain
          in: query
          description: Optional wallet chain for wallet-aware mode (default solana)
          required: false
          schema:
            type: string
            default: solana
        - name: limit
          in: query
          description: Optional top-N cap applied in wallet-aware mode
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: Exchange comparison data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeComparisonResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /charts/counterparties:
    get:
      tags: [Counterparties]
      summary: Get counterparty activity data
      description: |
        Returns transaction activity grouped by counterparty.
        Shows both transaction counts and total volumes per counterparty.
      operationId: getCounterpartyActivity
      parameters:
        - $ref: "#/components/parameters/TimePeriod"
        - $ref: "#/components/parameters/TransactionType"
        - name: limit
          in: query
          description: Maximum number of counterparties to return
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Counterparty activity data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CounterpartyActivityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /charts/pnl:
    get:
      tags: [PnL]
      summary: Get profit and loss data
      description: |
        Returns daily P&L and cumulative P&L over time.
        Positive values indicate profit, negative values indicate loss.
      operationId: getPnLData
      parameters:
        - $ref: "#/components/parameters/TimePeriod"
        - $ref: "#/components/parameters/Wallets"
        - name: aggregation
          in: query
          description: Data aggregation level
          schema:
            type: string
            enum: [daily, weekly, monthly]
            default: daily
      responses:
        "200":
          description: P&L data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PnLResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /charts/transactions/distribution:
    get:
      tags: [Transactions]
      summary: Get transaction distribution over time
      description: |
        Returns daily transaction counts grouped by wallet and transaction type.
        Also includes unique token counts per day.
      operationId: getTransactionDistribution
      parameters:
        - $ref: "#/components/parameters/TimePeriod"
        - $ref: "#/components/parameters/Wallets"
        - $ref: "#/components/parameters/TransactionType"
      responses:
        "200":
          description: Transaction distribution data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDistributionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /charts/holdings:
    get:
      tags: [Holdings]
      summary: Get token holding durations
      description: |
        Returns holding duration (in days) for top tokens in each wallet.
        Helps analyze long-term vs short-term holding behavior.
      operationId: getHoldingDurations
      parameters:
        - $ref: "#/components/parameters/Wallets"
        - name: limit
          in: query
          description: Number of top tokens per wallet
          schema:
            type: integer
            default: 5
            minimum: 1
            maximum: 20
        - name: unit
          in: query
          description: Time unit for holding duration
          schema:
            type: string
            enum: [days, weeks, months]
            default: days
      responses:
        "200":
          description: Holding duration data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HoldingDurationsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /charts/volume-benchmark:
    get:
      tags: [Transactions]
      summary: Get trading volume benchmark comparison
      description: |
        Returns trading volume comparison across multiple wallets or against benchmarks.
        Useful for performance analysis across accounts.
      operationId: getVolumeBenchmark
      parameters:
        - $ref: "#/components/parameters/TimePeriod"
        - $ref: "#/components/parameters/Wallets"
      responses:
        "200":
          description: Volume benchmark data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeBenchmarkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  parameters:
    TimePeriod:
      name: period
      in: query
      description: Time period for data retrieval
      required: true
      schema:
        type: string
        enum: ["7D", "30D", "60D", "90D", "1Y", "All"]
        default: "30D"

    Tokens:
      name: tokens
      in: query
      description: Comma-separated list of token symbols (omit for all tokens)
      schema:
        type: string
        example: "BTC,ETH,SOL"

    Wallets:
      name: wallets
      in: query
      description: Comma-separated list of wallet IDs (omit for all wallets)
      schema:
        type: string
        example: "wallet1,wallet2"

    TransactionType:
      name: type
      in: query
      description: Filter by transaction type
      schema:
        type: string
        enum: [all, trades, transfers, deposits, withdrawals]
        default: all

  schemas:
    BalanceTrendResponse:
      type: object
      required:
        - series
        - metadata
      properties:
        series:
          type: array
          description: Time series data for each token or total balance
          items:
            type: object
            required:
              - name
              - data
            properties:
              name:
                type: string
                description: Token symbol or "Total"
                example: BTC
              data:
                type: array
                items:
                  type: object
                  required:
                    - timestamp
                    - value
                  properties:
                    timestamp:
                      type: integer
                      format: int64
                      description: Unix timestamp in milliseconds
                      example: 1701648000000
                    value:
                      type: number
                      format: double
                      description: Balance value
                      example: 50000.50
        metadata:
          type: object
          required:
            - currency
            - timezone
            - aggregation
          properties:
            currency:
              type: string
              description: Display currency
              example: USD
            timezone:
              type: string
              description: Server timezone
              example: UTC
            aggregation:
              type: string
              description: Data granularity
              enum: [hourly, daily, weekly, monthly]
              example: daily

    AssetDistributionResponse:
      type: object
      required:
        - data
        - totalValue
        - metadata
      properties:
        data:
          type: array
          description: Distribution of assets
          items:
            type: object
            required:
              - name
              - value
              - percentage
            properties:
              name:
                type: string
                description: Token symbol
                example: BTC
              value:
                type: number
                format: double
                description: Token value in display currency
                example: 50000.00
              percentage:
                type: number
                format: double
                description: Percentage of total portfolio
                example: 45.5
        totalValue:
          type: number
          format: double
          description: Total portfolio value
          example: 110000.00
        metadata:
          type: object
          required:
            - currency
            - timestamp
          properties:
            currency:
              type: string
              example: USD
            timestamp:
              type: integer
              format: int64
              description: Snapshot timestamp
              example: 1701648000000

    ExchangeComparisonResponse:
      type: object
      required:
        - exchanges
        - metadata
      properties:
        exchanges:
          type: array
          description: Exchange activity data
          items:
            type: object
            required:
              - name
              - deposits
              - withdrawals
            properties:
              name:
                type: string
                description: Exchange name
                example: Binance
              deposits:
                type: number
                format: double
                description: Deposit count or volume
                example: 120
              withdrawals:
                type: number
                format: double
                description: Withdrawal count or volume
                example: 90
        metadata:
          type: object
          required:
            - period
            - metric
          properties:
            period:
              type: string
              description: Time period
              example: "30D"
            metric:
              type: string
              description: What values represent
              enum: [count, volume]
              example: count

    CounterpartyActivityResponse:
      type: object
      required:
        - counterparties
        - metadata
      properties:
        counterparties:
          type: array
          description: Counterparty activity data
          items:
            type: object
            required:
              - identifier
              - transactionCount
              - totalVolume
            properties:
              identifier:
                type: string
                description: Counterparty identifier (address or name)
                example: "0x1234...5678"
              transactionCount:
                type: integer
                description: Number of transactions
                example: 45
              totalVolume:
                type: number
                format: double
                description: Total transaction volume
                example: 15000.00
        metadata:
          type: object
          required:
            - period
            - currency
          properties:
            period:
              type: string
              example: "30D"
            currency:
              type: string
              example: USD

    PnLResponse:
      type: object
      required:
        - dailyPnL
        - cumulativePnL
        - metadata
      properties:
        dailyPnL:
          type: array
          description: Daily profit/loss values
          items:
            type: object
            required:
              - timestamp
              - value
            properties:
              timestamp:
                type: integer
                format: int64
                description: Unix timestamp
                example: 1701648000000
              value:
                type: number
                format: double
                description: Daily P&L (positive = profit, negative = loss)
                example: 1250.50
        cumulativePnL:
          type: array
          description: Cumulative profit/loss over time
          items:
            type: object
            required:
              - timestamp
              - value
            properties:
              timestamp:
                type: integer
                format: int64
                example: 1701648000000
              value:
                type: number
                format: double
                description: Running total P&L
                example: 5600.75
        metadata:
          type: object
          required:
            - currency
            - startBalance
            - endBalance
          properties:
            currency:
              type: string
              example: USD
            startBalance:
              type: number
              format: double
              description: Portfolio value at start of period
              example: 100000.00
            endBalance:
              type: number
              format: double
              description: Portfolio value at end of period
              example: 105600.75

    TransactionDistributionResponse:
      type: object
      required:
        - transactionCounts
        - uniqueTokens
        - metadata
      properties:
        transactionCounts:
          type: array
          description: Daily transaction counts grouped by wallet
          items:
            type: object
            required:
              - timestamp
              - wallets
            properties:
              timestamp:
                type: integer
                format: int64
                example: 1701648000000
              wallets:
                type: object
                description: Transaction counts per wallet
                additionalProperties:
                  type: integer
                example:
                  wallet1: 5
                  wallet2: 3
        uniqueTokens:
          type: array
          description: Unique token count per day
          items:
            type: object
            required:
              - timestamp
              - count
            properties:
              timestamp:
                type: integer
                format: int64
                example: 1701648000000
              count:
                type: integer
                description: Number of unique tokens traded
                example: 8
        metadata:
          type: object
          required:
            - period
          properties:
            period:
              type: string
              example: "30D"

    HoldingDurationsResponse:
      type: object
      required:
        - wallets
        - metadata
      properties:
        wallets:
          type: array
          description: Holding duration data per wallet
          items:
            type: object
            required:
              - walletId
              - tokens
            properties:
              walletId:
                type: string
                description: Wallet identifier
                example: wallet1
              tokens:
                type: array
                description: Top tokens with holding durations
                items:
                  type: object
                  required:
                    - symbol
                    - duration
                  properties:
                    symbol:
                      type: string
                      description: Token symbol
                      example: BTC
                    duration:
                      type: number
                      format: double
                      description: Holding duration in specified unit
                      example: 120
        metadata:
          type: object
          required:
            - unit
          properties:
            unit:
              type: string
              description: Time unit for durations
              enum: [days, weeks, months]
              example: days

    VolumeBenchmarkResponse:
      type: object
      required:
        - series
        - metadata
      properties:
        series:
          type: array
          description: Trading volume data per wallet
          items:
            type: object
            required:
              - name
              - data
            properties:
              name:
                type: string
                description: Wallet identifier
                example: wallet1
              data:
                type: array
                items:
                  type: object
                  required:
                    - timestamp
                    - value
                  properties:
                    timestamp:
                      type: integer
                      format: int64
                      example: 1701648000000
                    value:
                      type: number
                      format: double
                      description: Trading volume
                      example: 25000.00
        metadata:
          type: object
          required:
            - currency
            - period
          properties:
            currency:
              type: string
              example: USD
            period:
              type: string
              example: "30D"

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type/code
          example: INVALID_PARAMETER
        message:
          type: string
          description: Human-readable error message
          example: Invalid time period specified
        details:
          type: object
          description: Additional error context
          additionalProperties: true

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: INVALID_PARAMETER
            message: Invalid time period specified
            details:
              parameter: period
              provided: "45D"
              allowed: ["7D", "30D", "60D", "90D", "1Y", "All"]

    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: UNAUTHORIZED
            message: Authentication token missing or invalid

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: INTERNAL_ERROR
            message: An unexpected error occurred

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from authentication endpoint

security:
  - BearerAuth: []
