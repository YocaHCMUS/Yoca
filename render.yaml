services:
  - type: web
    name: yoca-server
    runtime: image
    repo: https://github.com/hongphuchcmus/Yoca
    image:
      url: ghcr.io/hongphuchcmus/yoca:main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CLIENT_PROD_DOMAIN
        value: https://yoca-client.onrender.com
      - key: CLIENT_LOCAL_DOMAIN
        sync: false
    autoDeploy: true

  - type: web
    name: yoca-client
    runtime: static
    repo: https://github.com/hongphuchcmus/Yoca
    buildCommand: npm install && npm run client:build
    publishPath: client/build
    envVars:
      - key: VITE_CLIENT_API_DOMAIN
        value: https://yoca-server.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
