name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/yoca

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - &setup
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - &node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - &install
        run: npm install
      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: |
            server/.tsbuildinfo
            client/.tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-
      - run: npm run typecheck --workspaces

  lint:
    runs-on: ubuntu-latest
    steps:
      - *setup
      - *node
      - *install
      - run: npm run lint --workspaces

  test-server:
    runs-on: ubuntu-latest
    steps:
      - *setup
      - *node
      - *install
      - name: Run server tests (changed-files only)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if ! git rev-parse --quiet --verify "$BASE" >/dev/null 2>&1; then
            BASE=""
          fi

          if [ -n "$BASE" ]; then
            RAN=$(npm run test -w=server -- --changed "$BASE" --reporter=json 2>/dev/null \
                  | grep -o '"numTotalTestSuites"[ ]*:[ ]*[0-9]*' | grep -o '[0-9]*' | tail -1)
            SRC=$(git diff --name-only "$BASE"...HEAD -- server/ | grep -qE '\.(ts|tsx)$' && echo yes || echo no)
            if [ "${RAN:-0}" = "0" ] && [ "$SRC" = "yes" ]; then
              echo "::notice::No tests matched changed files; running full server suite (safety net)."
              npm run test -w=server
            fi
          else
            npm run test -w=server
          fi

  test-client:
    runs-on: ubuntu-latest
    steps:
      - *setup
      - *node
      - *install
      - name: Run client tests (changed-files only)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if ! git rev-parse --quiet --verify "$BASE" >/dev/null 2>&1; then
            BASE=""
          fi

          if [ -n "$BASE" ]; then
            RAN=$(npm run test -w=client -- --run --changed "$BASE" --reporter=json 2>/dev/null \
                  | grep -o '"numTotalTestSuites"[ ]*:[ ]*[0-9]*' | grep -o '[0-9]*' | tail -1)
            SRC=$(git diff --name-only "$BASE"...HEAD -- client/ | grep -qE '\.(ts|tsx)$' && echo yes || echo no)
            if [ "${RAN:-0}" = "0" ] && [ "$SRC" = "yes" ]; then
              echo "::notice::No tests matched changed files; running full client suite (safety net)."
              npm run test -w=client -- --run
            fi
          else
            npm run test -w=client -- --run
          fi

  build-and-push:
    needs: [typecheck, lint, test-server, test-client]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
