name: CI

on:
  push:
    branches: [main, dev, development/cd]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - &setup
        uses: actions/checkout@v4
      - &node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - &install
        run: npm ci
      - run: npm run typecheck --workspaces

  lint:
    runs-on: ubuntu-latest
    steps:
      - *setup
      - *node
      - *install
      - run: npm run lint --workspaces

  test-server:
    runs-on: ubuntu-latest
    steps:
      - *setup
      - *node
      - *install
      - run: npm run test -w=server

  test-client:
    runs-on: ubuntu-latest
    steps:
      - *setup
      - *node
      - *install
      - run: npm run test -w=client -- --run

  build-server:
    runs-on: ubuntu-latest
    steps:
      - *setup
      - *node
      - *install
      - run: npm run server:build

  build-client:
    runs-on: ubuntu-latest
    steps:
      - *setup
      - *node
      - *install
      - run: npm run client:build

  build-and-push:
    # if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [typecheck, lint, test-server, test-client, build-server, build-client]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Downcase repo owner
        id: repo
        run: |
          echo "owner=${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/yoca/server:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/yoca/server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          build-args: |
            VITE_CLIENT_API_DOMAIN=${{ secrets.VITE_CLIENT_API_DOMAIN }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/yoca/client:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/yoca/client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max